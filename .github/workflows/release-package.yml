name: Build Windows portable package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v'
        required: false
        default: '1.2.30'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Packaging version $version"

      - name: Build portable package
        shell: pwsh
        run: ./scripts/publish-windows-portable.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Verify portable package structure
        shell: pwsh
        run: ./scripts/verify-release-package.ps1 -PackagePath "artifacts/release/ArIEC103-v${{ steps.version.outputs.version }}-win-x64-portable.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArIEC103-v${{ steps.version.outputs.version }}-win-x64-portable
          path: |
            artifacts/release/ArIEC103-v${{ steps.version.outputs.version }}-win-x64-portable.zip
            artifacts/release/SHA256SUMS.txt

      - name: Publish GitHub release assets for tag builds
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.ref_name }}'
          $zip = "artifacts/release/ArIEC103-v${{ steps.version.outputs.version }}-win-x64-portable.zip"
          $sha = "artifacts/release/SHA256SUMS.txt"
          $notes = "docs/RELEASE_NOTES_v1.2.30.md"
          if (-not (Test-Path $notes)) { $notes = "docs/RELEASE_PACKAGING.md" }
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $zip $sha --title "ArIEC103 $tag" --notes-file $notes --prerelease
          } else {
            gh release upload $tag $zip $sha --clobber
          }
