name: Build and protocol smoke tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ArIEC103.sln

      - name: Build
        run: dotnet build ArIEC103.sln --configuration Release --no-restore

      - name: Run dependency-free protocol smoke tests
        run: dotnet run --project tests/ArIEC103.Protocol.Tests/ArIEC103.Protocol.Tests.csproj --configuration Release --no-build
